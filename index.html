<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>100 · Vollsystemkern · 6E · 6D · GEO · FARB · RESPO · NATUR</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; letter-spacing:4px; margin-bottom:30px; }
.block { background:#111; border:1px solid #333; padding:25px; margin-bottom:30px; border-radius:8px; }
.title { font-size:22px; color:#6cf; margin-bottom:10px; }
pre { background:#000; border-left:3px solid #6cf; padding:15px; white-space:pre-wrap; }
</style>

<script type="module">
import DIM from "./dimension-bedeutung-4.csv" assert { type:"json" };
import { FARB } from "./FARB.System";
import { NATUR_MODE } from "./%.mode";
import { respo100 } from "./respo‑100.mode";
import { respo360 } from "./respo‑360.mode";
import { buildSpectrumDashboard } from "./Spek.js";
import { geoAxes, geoLAGE } from "./geo.js";

async function loadFile(name){
    try{
        const res = await fetch("./" + name);
        if(!res.ok) return { name, ok:false };
        const txt = await res.text();
        return { name, ok:true, content:txt };
    }catch(e){
        return { name, ok:false };
    }
}

async function start(){
    const out = document.getElementById("sys");

    const files = [
        "REAL.index",
        "ID.html",
        "NC²□.sync",
        "dimension-bedeutung-4.csv",
        "scan.language",
        "ORT.scan",
        "gone.room",
        "BEN.tmp",
        "C.tmp",
        "DA.tmp",
        "NE.tmp",
        "X.tmp",
        "Z.tmp"
    ];

    const results = [];
    for(const f of files){
        results.push(await loadFile(f));
    }

    out.innerText = JSON.stringify({
        DIM,
        GEO_AXES: geoAxes(),
        GEO_LAGE: geoLAGE(),
        FARB,
        NATUR_MODE,
        RESPO_100: respo100(),
        RESPO_360: respo360(),
        SPEKTRUM: buildSpectrumDashboard(),
        FILES: results
    }, null, 2);
}

start();
</script>
</head>

<body>

<h1>100 · Vollsystemkern · 6E · 6D · GEO · FARB · RESPO · NATUR</h1>

<div class="block">
    <div class="title">System‑Status · Vollaktivierung</div>
    <pre id="sys">Lade…</pre>
</div>

</body>
</html>
